<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewatch - Campsite Availability Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-active { background-color: #10b981; }
        .status-paused { background-color: #6b7280; }
        .status-alerted { background-color: #3b82f6; }
        .status-error { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-gray-900">🔥 Firewatch</h1>
                    <span class="ml-3 text-sm text-gray-500">Campsite Availability Monitor</span>
                </div>
                <div id="healthStatus" class="text-sm text-gray-500">
                    <span class="status-dot status-active"></span>
                    <span>Checking status...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Quick Actions -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold text-gray-900">Active Watches</h2>
                    <p class="text-sm text-gray-500 mt-1">Monitoring <span id="activeCount" class="font-medium">0</span> campgrounds</p>
                </div>
                <button onclick="showCreateWatchModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + New Watch
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-lg shadow-sm mb-6">
            <div class="border-b">
                <nav class="flex">
                    <button onclick="switchTab('watches')" id="tab-watches" class="tab-button active">
                        Watches
                    </button>
                    <button onclick="switchTab('templates')" id="tab-templates" class="tab-button">
                        Templates
                    </button>
                    <button onclick="switchTab('logs')" id="tab-logs" class="tab-button">
                        Alert Logs
                    </button>
                </nav>
            </div>

            <!-- Watches Tab -->
            <div id="content-watches" class="tab-content p-6">
                <div id="watchesList" class="space-y-4">
                    <!-- Watches will be loaded here -->
                    <div class="text-center text-gray-500 py-8">Loading watches...</div>
                </div>
            </div>

            <!-- Templates Tab -->
            <div id="content-templates" class="tab-content p-6 hidden">
                <div class="mb-4">
                    <button onclick="showCreateTemplateModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        + New Template
                    </button>
                </div>
                <div id="templatesList" class="space-y-4">
                    <div class="text-center text-gray-500 py-8">Loading templates...</div>
                </div>
            </div>

            <!-- Logs Tab -->
            <div id="content-logs" class="tab-content p-6 hidden">
                <div id="logsList" class="space-y-3">
                    <div class="text-center text-gray-500 py-8">Loading logs...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Watch Modal -->
    <div id="createWatchModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h3 class="text-lg font-semibold mb-4">Create New Watch</h3>
            <form id="createWatchForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Campground ID</label>
                    <input type="number" name="campground_id" required class="w-full border rounded-lg px-3 py-2">
                    <p class="text-xs text-gray-500 mt-1">From Recreation.gov URL (e.g., 232447)</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Campground Name</label>
                    <input type="text" name="campground_name" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Check-in</label>
                        <input type="date" name="checkin_date" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Check-out</label>
                        <input type="date" name="checkout_date" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Site Type</label>
                    <select name="site_type" required class="w-full border rounded-lg px-3 py-2">
                        <option value="Any">Any</option>
                        <option value="Standard">Standard</option>
                        <option value="Electric">Electric</option>
                        <option value="Full Hookup">Full Hookup</option>
                        <option value="Group">Group</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alert Email</label>
                    <input type="email" name="alert_email" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pushover Key (optional)</label>
                    <input type="text" name="pushover_key" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        Create Watch
                    </button>
                    <button type="button" onclick="hideCreateWatchModal()" class="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Template Modal -->
    <div id="createTemplateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <h3 class="text-lg font-semibold mb-4">Create New Template</h3>
            <form id="createTemplateForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Campground ID</label>
                    <input type="number" name="campground_id" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Campground Name</label>
                    <input type="text" name="campground_name" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                        <input type="date" name="date_range_start" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
                        <input type="date" name="date_range_end" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Days of Week</label>
                    <div class="grid grid-cols-7 gap-2">
                        <label class="text-center"><input type="checkbox" value="0" class="days-of-week mb-1"><br><span class="text-xs">Mon</span></label>
                        <label class="text-center"><input type="checkbox" value="1" class="days-of-week mb-1"><br><span class="text-xs">Tue</span></label>
                        <label class="text-center"><input type="checkbox" value="2" class="days-of-week mb-1"><br><span class="text-xs">Wed</span></label>
                        <label class="text-center"><input type="checkbox" value="3" class="days-of-week mb-1"><br><span class="text-xs">Thu</span></label>
                        <label class="text-center"><input type="checkbox" value="4" class="days-of-week mb-1"><br><span class="text-xs">Fri</span></label>
                        <label class="text-center"><input type="checkbox" value="5" class="days-of-week mb-1"><br><span class="text-xs">Sat</span></label>
                        <label class="text-center"><input type="checkbox" value="6" class="days-of-week mb-1"><br><span class="text-xs">Sun</span></label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Site Type</label>
                    <select name="site_type" required class="w-full border rounded-lg px-3 py-2">
                        <option value="Any">Any</option>
                        <option value="Standard">Standard</option>
                        <option value="Electric">Electric</option>
                        <option value="Full Hookup">Full Hookup</option>
                        <option value="Group">Group</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alert Email</label>
                    <input type="email" name="alert_email" required class="w-full border rounded-lg px-3 py-2">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        Create Template
                    </button>
                    <button type="button" onclick="hideCreateTemplateModal()" class="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>

    <style>
        .tab-button {
            padding: 1rem 1.5rem;
            font-medium;
            border-bottom: 2px solid transparent;
            color: #6b7280;
            transition: all 0.2s;
        }
        .tab-button:hover {
            color: #111827;
        }
        .tab-button.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
    </style>
</body>
</html>
