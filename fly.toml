# Fly.io deployment configuration for Firewatch

app = 'firewatch'
primary_region = 'sjc'  # San Jose - change to your preferred region

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'
  POLL_INTERVAL_MINUTES = '5'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # Keep scheduler running
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[mounts]
  source = 'firewatch_data'
  destination = '/data'
  initial_size = '1gb'

# Secrets (set with: flyctl secrets set KEY=VALUE)
# - SMTP_HOST
# - SMTP_PORT
# - SMTP_USER
# - SMTP_PASSWORD
# - API_KEY (optional)
# - PUSHOVER_APP_TOKEN (optional)
